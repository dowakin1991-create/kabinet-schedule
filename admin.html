<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KABINET - Панель ШЕФА</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #2c3e50;
            --primary: #1F6B6B; --weekend: #e0e0e0; --border: #dee2e6;
            --row-1: #fdf2f2; --row-2: #f0f7f4; --row-3: #fef6e3; --row-4: #f3f0f7; --row-5: #eef5fb;
        }

        [data-theme="dark"] {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0;
            --primary: #2ebfbf; --weekend: #333333; --border: #444444;
            --row-1: #3a2a2a; --row-2: #2a3a32; --row-3: #3a352a; --row-4: #2e2a3a; --row-5: #2a333a;
        }

        body {
            font-family: 'Montserrat', sans-serif; background-color: var(--bg-body);
            color: var(--text-main); margin: 0; padding: 20px; transition: all 0.3s ease;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        [data-theme="dark"] header { background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }

        .logo { height: 50px; object-fit: contain; }

        .admin-badge {
            background: #e74c3c; color: white; padding: 4px 10px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; display: block; margin-bottom: 5px;
        }

        .admin-controls {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
            background: var(--bg-card); padding: 15px; border-radius: 12px;
        }

        input {
            flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-body); color: var(--text-main); font-family: inherit;
        }

        button {
            padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none;
        }

        .add-btn { background: var(--primary); color: white; }
        .excel-btn { background: #27ae60; color: white; }
        .del-btn { background: none; color: #e74c3c; font-size: 0.8rem; cursor: pointer; margin-left: 5px; border: 1px solid #e74c3c; padding: 2px 5px; border-radius: 4px; }

        .table-wrapper {
            overflow-x: auto; background: var(--bg-card); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1000px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        th { background: #34495e; color: white; position: sticky; top: 0; z-index: 4; }

        /* МАГНІТНА КОЛОНКА */
        th:first-child, td:first-child {
            position: sticky; left: 0; z-index: 5; background: inherit;
            text-align: left; padding-left: 15px; font-weight: 700; border-left: 1px solid var(--border);
            min-width: 180px;
        }
        th:first-child { background: #34495e; z-index: 6; }

        .weekend { background-color: var(--weekend) !important; }
        .shift { color: var(--primary); font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .unavail-marker { color: #ff4d4d; font-size: 1.2rem; vertical-align: middle; }

        /* Рядки */
        tr:nth-child(5n+1) td { background-color: var(--row-1); }
        tr:nth-child(5n+2) td { background-color: var(--row-2); }
        tr:nth-child(5n+3) td { background-color: var(--row-3); }
        tr:nth-child(5n+4) td { background-color: var(--row-4); }
        tr:nth-child(5n+5) td { background-color: var(--row-5); }

        .theme-toggle {
            cursor: pointer; padding: 10px; border-radius: 50%; border: 2px solid var(--primary);
            background: none; color: var(--primary); display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <header>
        <div>
            <span class="admin-badge">ШЕФ</span>
            <img src="IMG_9802.png" alt="Logo" class="logo">
        </div>
        <div style="text-align:center; display: flex; align-items: center;">
            <button onclick="changeMonth(-1)" style="background:none; font-size:1.5rem;">◀</button>
            <span id="month-label" style="font-weight:900; font-size: 1.2rem; margin: 0 15px; min-width: 180px;">Квітень 2026</span>
            <button onclick="changeMonth(1)" style="background:none; font-size:1.5rem;">▶</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="admin-controls">
        <input type="text" id="newEmpName" placeholder="Прізвище та ім'я працівника">
        <button class="add-btn" onclick="addEmployee()">Додати</button>
        <button class="excel-btn" onclick="exportToExcel()">Зберегти для Viber (Excel)</button>
    </div>

    <div class="table-wrapper">
        <table id="admin-table">
            <thead><tr id="h-row"></tr></thead>
            <tbody id="b-row"></tbody>
        </table>
    </div>
</div>

<script>
    let currentDate = new Date(2026, 3, 1); // Квітень 2026
    const monthNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

    let employees = [
        { id: 1, name: "Марічка", shifts: [1,2,5], unavail: [] },
        { id: 2, name: "Віталік", shifts: [3,4], unavail: [15] }
    ];

    function toggleTheme() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }
    if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));

    function addEmployee() {
        const name = document.getElementById('newEmpName').value;
        if(name) {
            employees.push({ id: Date.now(), name: name, shifts: [], unavail: [] });
            document.getElementById('newEmpName').value = '';
            render();
        }
    }

    function deleteEmployee(id) {
        if(confirm("Видалити цього працівника з графіка?")) {
            employees = employees.filter(e => e.id !== id);
            render();
        }
    }

    function render() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        document.getElementById('month-label').innerText = `${monthNames[month]} ${year}`;

        const head = document.getElementById('h-row');
        const body = document.getElementById('b-row');
        
        // Заголовок
        let headHtml = '<th>Працівник</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const dayOfWeek = new Date(year, month, i).getDay();
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            headHtml += `<th class="${isWeekend?'weekend':''}">${i}</th>`;
        }
        head.innerHTML = headHtml;

        // Рядки
        body.innerHTML = employees.map(emp => `
            <tr>
                <td>
                    ${emp.name} 
                    <button class="del-btn" onclick="deleteEmployee(${emp.id})">×</button>
                </td>
                ${Array.from({length: daysInMonth}, (_, i) => {
                    const day = i + 1;
                    const dayOfWeek = new Date(year, month, day).getDay();
                    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                    let content = emp.shifts.includes(day) ? '<span class="shift">X</span>' : '';
                    if(emp.unavail.includes(day)) content += '<span class="unavail-marker">•</span>';
                    return `<td class="${isWeekend?'weekend':''}" onclick="toggleShift(${emp.id}, ${day})">${content}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    function toggleShift(empId, day) {
        const emp = employees.find(e => e.id === empId);
        if(emp.shifts.includes(day)) {
            emp.shifts = emp.shifts.filter(d => d !== day);
        } else {
            emp.shifts.push(day);
        }
        render();
    }

    function changeMonth(dir) {
        currentDate.setMonth(currentDate.getMonth() + dir);
        render();
    }

    // Експорт в CSV (Excel розуміє цей формат)
    function exportToExcel() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let csvContent = "Працівник;";
        for(let i=1; i<=daysInMonth; i++) csvContent += i + ";";
        csvContent += "\n";

        employees.forEach(emp => {
            csvContent += emp.name + ";";
            for(let i=1; i<=daysInMonth; i++) {
                let status = "";
                if(emp.shifts.includes(i)) status = "X";
                if(emp.unavail.includes(i)) status += "(не може)";
                csvContent += status + ";";
            }
            csvContent += "\n";
        });

        const encodedUri = encodeURI("data:text/csv;charset=utf-8,\uFEFF" + csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Графік_Kabinet_${monthNames[month]}_${year}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    render();
</script>
</body>
</html>
