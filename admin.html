<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KABINET - Панель ШЕФА</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #2c3e50;
            --primary: #1F6B6B; --weekend: #e0e0e0; --border: #dee2e6;
            --row-1: #fdf2f2; --row-2: #f0f7f4; --row-3: #fef6e3; --row-4: #f3f0f7; --row-5: #eef5fb;
        }

        [data-theme="dark"] {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0;
            --primary: #2ebfbf; --weekend: #333333; --border: #444444;
            --row-1: #3a2a2a; --row-2: #2a3a32; --row-3: #3a352a; --row-4: #2e2a3a; --row-5: #2a333a;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; transition: all 0.3s ease; }
        .container { max-width: 1300px; margin: 0 auto; }
        header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.3); }
        [data-theme="dark"] header { background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo-block { display: flex; align-items: center; gap: 10px; }
        .logo { height: 40px; object-fit: contain; }
        .admin-badge { background: #e74c3c; color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; display: inline-block; }
        .month-selector { display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        .admin-controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: var(--bg-card); padding: 15px; border-radius: 12px; }
        @media(min-width: 768px) { .admin-controls { flex-direction: row; align-items: center; } }
        
        input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); font-family: inherit; font-size: 1rem; }
        button { padding: 12px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 5px;}
        .add-btn { background: #3498db; color: white; }
        .viber-btn { background: #7360f2; color: white; }
        .del-btn { background: none; color: #e74c3c; font-size: 1rem; cursor: pointer; margin-left: 5px; padding: 0 5px; }
        
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--bg-card); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; background: white; } /* Білий фон для скріншоту */
        [data-theme="dark"] table { background: var(--bg-card); }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        th { background: #34495e; color: white; position: sticky; top: 0; z-index: 4; }
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 5; background: inherit; text-align: left; padding-left: 15px; font-weight: 700; border-left: 1px solid var(--border); min-width: 140px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        th:first-child { background: #34495e; z-index: 6; }
        
        .weekend { background-color: var(--weekend) !important; }
        .shift { color: var(--primary); font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .unavail-marker { color: #ff4d4d; font-weight: 900; font-size: 1.8rem; line-height: 0; vertical-align: bottom; }
        
        tr:nth-child(5n+1) td { background-color: var(--row-1); }
        tr:nth-child(5n+2) td { background-color: var(--row-2); }
        tr:nth-child(5n+3) td { background-color: var(--row-3); }
        tr:nth-child(5n+4) td { background-color: var(--row-4); }
        tr:nth-child(5n+5) td { background-color: var(--row-5); }
        
        .theme-toggle { cursor: pointer; padding: 10px; border-radius: 50%; border: 2px solid var(--primary); background: none; color: var(--primary); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <header>
        <div class="logo-block">
            <div>
                <span class="admin-badge">ШЕФ</span><br>
                <img src="IMG_9802.png" alt="Logo" class="logo">
            </div>
        </div>
        <div class="month-selector">
            <button onclick="changeMonth(-1)" style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:var(--text-main); padding: 0 15px;">◀</button>
            <span id="month-label" style="font-weight:900; font-size: 1.2rem; text-align: center; min-width: 160px;">Завантаження...</span>
            <button onclick="changeMonth(1)" style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:var(--text-main); padding: 0 15px;">▶</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="admin-controls">
        <input type="text" id="newEmpName" placeholder="Ім'я працівника">
        <button class="add-btn" onclick="addEmployee()">+ Додати</button>
        <button class="viber-btn" onclick="shareScreenshot()">📷 Надіслати скріншот</button>
    </div>

    <div class="table-wrapper" id="capture-area">
        <table id="admin-table">
            <thead><tr id="h-row"></tr></thead>
            <tbody id="b-row"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgCPf1UqXE4DNhfdGJ6QklEKc055lu4k4",
      authDomain: "kabinet-schedule.firebaseapp.com",
      projectId: "kabinet-schedule",
      storageBucket: "kabinet-schedule.firebasestorage.app",
      messagingSenderId: "511103121210",
      appId: "1:511103121210:web:e3e74ff2551f98543f8203"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDate = new Date();
    currentDate.setDate(1); 
    const monthNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
    let employees = [];
    let unsubscribe = null;

    function getDocId() {
        return `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
    }

    // Завантаження з РЕАЛЬНОЧАСОВИМ оновленням
    function loadData() {
        if(unsubscribe) unsubscribe();
        
        document.getElementById('month-label').innerText = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        
        unsubscribe = onSnapshot(doc(db, "schedules", getDocId()), (docSnap) => {
            if (docSnap.exists()) {
                employees = docSnap.data().employees || [];
                render();
            } else {
                // ПЕРЕНЕСЕННЯ ПРАЦІВНИКІВ: якщо місяць пустий, але ми маємо список з минулого місяця
                if (employees.length > 0) {
                    employees = employees.map(emp => ({ ...emp, shifts: [], unavail: [] }));
                    saveData(); // Миттєво зберігаємо новий місяць з іменами
                } else {
                    employees = [];
                    render();
                }
            }
        });
    }

    // Автозбереження у фоні
    async function saveData() {
        try {
            await setDoc(doc(db, "schedules", getDocId()), { employees });
        } catch (e) {
            console.error("Помилка збереження", e);
        }
    }

    function render() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const head = document.getElementById('h-row');
        const body = document.getElementById('b-row');
        
        let headHtml = '<th>Працівник</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const isWeekend = (new Date(year, month, i).getDay() % 6 === 0);
            headHtml += `<th class="${isWeekend?'weekend':''}">${i}</th>`;
        }
        head.innerHTML = headHtml;

        body.innerHTML = employees.map(emp => `
            <tr>
                <td>
                    ${emp.name} 
                    <button class="del-btn" onclick="deleteEmployee(${emp.id})">×</button>
                </td>
                ${Array.from({length: daysInMonth}, (_, i) => {
                    const day = i + 1;
                    const isWeekend = (new Date(year, month, day).getDay() % 6 === 0);
                    let content = emp.shifts.includes(day) ? '<span class="shift">X</span>' : '';
                    if(emp.unavail.includes(day)) content += '<span class="unavail-marker">•</span>';
                    return `<td class="${isWeekend?'weekend':''}" onclick="toggleShift(${emp.id}, ${day})">${content}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    window.addEmployee = function() {
        const name = document.getElementById('newEmpName').value;
        if(name) {
            employees.push({ id: Date.now(), name: name, shifts: [], unavail: [] });
            document.getElementById('newEmpName').value = '';
            saveData(); // Миттєве збереження
        }
    }

    window.deleteEmployee = function(id) {
        if(confirm("Видалити цього працівника з графіка?")) {
            employees = employees.filter(e => e.id !== id);
            saveData();
        }
    }

    window.toggleShift = function(empId, day) {
        const emp = employees.find(e => e.id === empId);
        if(emp) {
            if(emp.shifts.includes(day)) emp.shifts = emp.shifts.filter(d => d !== day);
            else emp.shifts.push(day);
            render(); // Миттєве візуальне оновлення
            saveData(); // Збереження в хмару
        }
    }

    window.changeMonth = function(dir) {
        currentDate.setMonth(currentDate.getMonth() + dir);
        loadData();
    }

    // МАГІЯ СКРІНШОТУ ТА ВІДПРАВКИ
    window.shareScreenshot = async function() {
        const btn = document.querySelector('.viber-btn');
        btn.innerText = "⏳ Створюю...";
        
        try {
            // Робимо таблицю білою для красивого фото, навіть якщо включена темна тема
            const captureArea = document.getElementById('capture-area');
            const originalBg = captureArea.style.backgroundColor;
            captureArea.style.backgroundColor = "#ffffff";
            
            const canvas = await html2canvas(captureArea, { scale: 2 });
            captureArea.style.backgroundColor = originalBg; // Повертаємо фон
            
            canvas.toBlob(async (blob) => {
                const file = new File([blob], `Графік_${monthNames[currentDate.getMonth()]}.png`, { type: "image/png" });
                
                // Якщо телефон підтримує нативне меню "Поділитися" (iOS / Сучасний Android)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Графік KABINET',
                        text: 'Актуальний графік роботи'
                    });
                } else {
                    // Якщо це комп'ютер - просто завантажуємо картинку
                    const link = document.createElement('a');
                    link.download = `Графік_${monthNames[currentDate.getMonth()]}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                    alert("Скріншот завантажено! Тепер ви можете скинути його у Viber.");
                }
                btn.innerText = "📷 Надіслати скріншот";
            });
        } catch (e) {
            console.error(e);
            alert("Помилка при створенні скріншоту.");
            btn.innerText = "📷 Надіслати скріншот";
        }
    }

    window.toggleTheme = function() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }
    if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));

    loadData();
</script>
</body>
</html>
