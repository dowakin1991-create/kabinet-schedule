<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KABINET - Графік (Перегляд)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #2c3e50;
            --primary: #1F6B6B; --weekend: #e0e0e0; --border: #dee2e6;
            --row-1: #fdf2f2; --row-2: #f0f7f4; --row-3: #fef6e3; --row-4: #f3f0f7; --row-5: #eef5fb;
        }

        [data-theme="dark"] {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0;
            --primary: #2ebfbf; --weekend: #333333; --border: #444444;
            --row-1: #3a2a2a; --row-2: #2a3a32; --row-3: #3a352a; --row-4: #2e2a3a; --row-5: #2a333a;
        }

        body {
            font-family: 'Montserrat', sans-serif; background-color: var(--bg-body);
            color: var(--text-main); margin: 0; padding: 20px; transition: all 0.3s ease;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        [data-theme="dark"] header { background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }

        .logo { height: 60px; object-fit: contain; }

        .theme-toggle {
            cursor: pointer; padding: 10px; border-radius: 50%; border: 2px solid var(--primary);
            background: none; color: var(--primary); display: flex; align-items: center; justify-content: center;
        }

        .table-wrapper { overflow-x: auto; background: var(--bg-card); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        th { border-top: 1px solid var(--border); background: var(--primary); color: white; font-weight: 500; font-size: 0.9rem; }
        
        /* МАГНІТНА КОЛОНКА */
        th:first-child, td:first-child {
            position: sticky; left: 0; z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            text-align: left; padding-left: 15px; border-left: 1px solid var(--border);
        }
        th:first-child { z-index: 3; background: var(--primary); }

        .weekend { background-color: var(--weekend) !important; }
        .unavailable { color: #ff4d4d; font-weight: 900; font-size: 1.5rem; line-height: 0; cursor: pointer; }
        .shift { font-weight: 700; color: var(--primary); cursor: pointer; }

        tr:nth-child(5n+1) td { background-color: var(--row-1); }
        tr:nth-child(5n+2) td { background-color: var(--row-2); }
        tr:nth-child(5n+3) td { background-color: var(--row-3); }
        tr:nth-child(5n+4) td { background-color: var(--row-4); }
        tr:nth-child(5n+5) td { background-color: var(--row-5); }
        
        .hint-text { font-size: 0.8rem; margin-top: 15px; color: #888; font-weight: 500; }
        button.nav-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 10px; color: var(--text-main); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <header>
        <img src="IMG_9802.png" alt="Kabinet Logo" class="logo">
        <div style="text-align:center; display: flex; align-items: center;">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <span id="month-label" style="font-weight:900; font-size: 1.1rem; margin: 0 15px; min-width: 150px;">Завантаження...</span>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="table-wrapper">
        <table id="schedule">
            <thead><tr id="header-row"></tr></thead>
            <tbody id="body-row"></tbody>
        </table>
    </div>
    <p class="hint-text">* Натисніть на клітинку, щоб поставити червону крапку (якщо не можете працювати)</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgCPf1UqXE4DNhfdGJ6QklEKc055lu4k4",
      authDomain: "kabinet-schedule.firebaseapp.com",
      projectId: "kabinet-schedule",
      storageBucket: "kabinet-schedule.firebasestorage.app",
      messagingSenderId: "511103121210",
      appId: "1:511103121210:web:e3e74ff2551f98543f8203"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDate = new Date(2026, 3, 1); // Починаємо з Квітня 2026
    let employees = [];
    const monthNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
    let unsubscribe = null;

    function getDocId() {
        return `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
    }

    // Завантаження даних з хмари (в реальному часі)
    function loadData() {
        if(unsubscribe) unsubscribe(); // Відписуємось від старого місяця
        
        document.getElementById('month-label').innerText = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        
        unsubscribe = onSnapshot(doc(db, "schedules", getDocId()), (docSnap) => {
            if (docSnap.exists()) {
                employees = docSnap.data().employees || [];
            } else {
                employees = []; // Якщо місяць пустий
            }
            render();
        });
    }

    // Збереження даних у хмару
    async function saveData() {
        await setDoc(doc(db, "schedules", getDocId()), { employees });
    }

    // Функція рендеру таблиці
    function render() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const head = document.getElementById('header-row');
        const body = document.getElementById('body-row');
        
        let headHtml = '<th>Ім\'я</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const isWeekend = (new Date(year, month, i).getDay() % 6 === 0);
            headHtml += `<th class="${isWeekend?'weekend':''}">${i}</th>`;
        }
        head.innerHTML = headHtml;

        body.innerHTML = employees.map(emp => `
            <tr>
                <td style="font-weight:700;">${emp.name}</td>
                ${Array.from({length:daysInMonth}, (_, i) => {
                    const day = i + 1;
                    const isWeekend = (new Date(year, month, day).getDay() % 6 === 0);
                    let content = emp.shifts.includes(day) ? '<span class="shift">X</span>' : '';
                    if(emp.unavail.includes(day)) content = '<span class="unavailable">•</span>';
                    return `<td class="${isWeekend?'weekend':''}" onclick="markUnavail(${emp.id}, ${day})">${content}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    // Глобальні функції для HTML
    window.markUnavail = function(empId, day) {
        const emp = employees.find(e => e.id === empId);
        if(emp) {
            if(emp.unavail.includes(day)) emp.unavail = emp.unavail.filter(d => d !== day);
            else emp.unavail.push(day);
            saveData();
        }
    }

    window.changeMonth = function(dir) {
        currentDate.setMonth(currentDate.getMonth() + dir);
        loadData();
    }

    window.toggleTheme = function() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }
    
    if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));

    // Старт
    loadData();
</script>
</body>
</html>
