<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KABINET - Графік</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #2c3e50;
            --primary: #1F6B6B; --weekend: #e9ecef; --border: #c4cdd5;
            --row-1: #fdf2f2; --row-2: #f0f7f4; --row-3: #fef6e3; --row-4: #f3f0f7; --row-5: #eef5fb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0;
                --primary: #2ebfbf; --weekend: #2a2a2a; --border: #444444;
                --row-1: #3a2a2a; --row-2: #2a3a32; --row-3: #3a352a; --row-4: #2e2a3a; --row-5: #2a333a;
            }
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; transition: background-color 0.3s ease; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; background: var(--bg-card); padding: 12px 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--border); }
        .logo { height: 35px; object-fit: contain; }
        .month-selector { display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        .nav-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 15px; color: var(--text-main); }
        
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--bg-card); border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px; background: var(--bg-card); }
        
        th, td { padding: 4px; height: 44px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); box-sizing: border-box; }
        th { border-top: 1px solid var(--border); background: var(--primary); color: white; font-weight: 500; font-size: 0.9rem; }
        
        th:first-child, td:first-child { 
            position: sticky; left: 0; z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,0.05); 
            text-align: left; padding-left: 10px; border-left: 1px solid var(--border); 
            min-width: 100px; max-width: 140px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        th:first-child { z-index: 3; background: var(--primary); }
        
        .weekend { background-color: var(--weekend) !important; }
        .unavailable { color: #ff4d4d; font-weight: 900; font-size: 1.5rem; line-height: 0; cursor: pointer; vertical-align: bottom; }
        .shift { font-weight: 700; color: var(--primary); cursor: pointer; }
        
        tr:nth-child(5n+1) td { background-color: var(--row-1); }
        tr:nth-child(5n+2) td { background-color: var(--row-2); }
        tr:nth-child(5n+3) td { background-color: var(--row-3); }
        tr:nth-child(5n+4) td { background-color: var(--row-4); }
        tr:nth-child(5n+5) td { background-color: var(--row-5); }
        
        .hint-text { font-size: 0.8rem; margin-top: 15px; color: #888; font-weight: 500; text-align: center;}
    </style>
</head>
<body>
<div class="container">
    <header>
        <img src="IMG_9802.png" alt="Kabinet Logo" class="logo">
        <div class="month-selector">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <span id="month-label" style="font-weight:900; font-size: 1.1rem; text-align: center; min-width: 140px;">...</span>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
    </header>

    <div class="table-wrapper">
        <table id="schedule">
            <thead><tr id="header-row"></tr></thead>
            <tbody id="body-row"></tbody>
        </table>
    </div>
    <p class="hint-text">* Натисніть на клітинку, щоб поставити червону крапку (якщо не можете працювати)<br><b>X</b> - Повний день | <b>/</b> - Перша половина | <b>\</b> - Друга половина</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgCPf1UqXE4DNhfdGJ6QklEKc055lu4k4",
      authDomain: "kabinet-schedule.firebaseapp.com",
      projectId: "kabinet-schedule",
      storageBucket: "kabinet-schedule.firebasestorage.app",
      messagingSenderId: "511103121210",
      appId: "1:511103121210:web:e3e74ff2551f98543f8203"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDate = new Date();
    currentDate.setDate(1); 
    let employees = [];
    const monthNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
    const dayNames = ["Нд", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"]; 
    let unsubscribe = null;

    function getDocId() {
        return `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
    }

    function loadData() {
        if(unsubscribe) unsubscribe();
        
        document.getElementById('month-label').innerText = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        
        unsubscribe = onSnapshot(doc(db, "schedules", getDocId()), (docSnap) => {
            if (docSnap.exists()) {
                let data = docSnap.data().employees || [];
                employees = data.map(emp => ({
                    ...emp,
                    shiftsFirst: emp.shiftsFirst || [],
                    shiftsSecond: emp.shiftsSecond || []
                }));
                render();
            } else {
                if (employees.length > 0) {
                    employees = employees.map(emp => ({ ...emp, shifts: [], shiftsFirst: [], shiftsSecond: [], unavail: [] }));
                    saveData();
                } else {
                    employees = [];
                    render();
                }
            }
        });
    }

    async function saveData() {
        try { await setDoc(doc(db, "schedules", getDocId()), { employees }); } 
        catch(e) { console.error(e); }
    }

    function render() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const head = document.getElementById('header-row');
        const body = document.getElementById('body-row');
        
        let headHtml = '<th>Ім\'я</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const dayIndex = new Date(year, month, i).getDay();
            const isWeekend = (dayIndex === 0 || dayIndex === 6);
            
            headHtml += `<th class="${isWeekend?'weekend':''}" style="line-height: 1.1;">
                ${i}<br><span style="font-size: 0.65rem; font-weight: normal; opacity: 0.85;">${dayNames[dayIndex]}</span>
            </th>`;
        }
        head.innerHTML = headHtml;

        body.innerHTML = employees.map(emp => `
            <tr>
                <td style="font-weight:700;">${emp.name}</td>
                ${Array.from({length:daysInMonth}, (_, i) => {
                    const day = i + 1;
                    const isWeekend = (new Date(year, month, day).getDay() % 6 === 0);
                    
                    let content = '';
                    if(emp.shifts.includes(day)) content = '<span class="shift">X</span>';
                    else if(emp.shiftsFirst.includes(day)) content = '<span class="shift">/</span>';
                    else if(emp.shiftsSecond.includes(day)) content = '<span class="shift">\\</span>';
                    
                    if(emp.unavail.includes(day)) content += '<span class="unavailable">•</span>';
                    
                    return `<td class="${isWeekend?'weekend':''}" onclick="markUnavail(${emp.id}, ${day})">${content}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    window.markUnavail = function(empId, day) {
        const emp = employees.find(e => e.id === empId);
        if(emp) {
            if(emp.unavail.includes(day)) emp.unavail = emp.unavail.filter(d => d !== day);
            else emp.unavail.push(day);
            render(); 
            saveData(); 
        }
    }

    window.changeMonth = function(dir) {
        currentDate.setMonth(currentDate.getMonth() + dir);
        loadData();
    }

    loadData();
</script>
</body>
</html>
