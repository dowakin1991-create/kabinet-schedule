<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KABINET - Графік (Перегляд)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Світла тема */
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --primary: #1F6B6B; /* Колір з лого KABINET */
            --weekend: #e0e0e0;
            --border: #dee2e6;
            --row-1: #fdf2f2; --row-2: #f0f7f4; --row-3: #fef6e3; --row-4: #f3f0f7; --row-5: #eef5fb;
        }

        [data-theme="dark"] {
            /* Темна тема */
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --primary: #2ebfbf;
            --weekend: #333333;
            --border: #444444;
            --row-1: #3a2a2a; --row-2: #2a3a32; --row-3: #3a352a; --row-4: #2e2a3a; --row-5: #2a333a;
        }

        body {
            font-family: 'Montserrat', sans-serif; /* Трендовий шрифт */
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px;
            transition: all 0.3s ease;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.8); /* Скляний ефект */
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        [data-theme="dark"] header {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { height: 60px; object-fit: contain; }

        .theme-toggle {
            cursor: pointer; padding: 10px; border-radius: 50%;
            border: 2px solid var(--primary); background: none; color: var(--primary);
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* Контейнер для таблиці */
        .table-wrapper {
            overflow-x: auto;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Налаштування для "примагніченої" колонки */
        table {
            width: 100%;
            border-collapse: separate; 
            border-spacing: 0;
            min-width: 800px;
        }

        th, td { 
            padding: 12px 8px; 
            text-align: center; 
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }
        
        th { border-top: 1px solid var(--border); background: var(--primary); color: white; font-weight: 500; font-size: 0.9rem; }
        th:first-child, td:first-child { border-left: 1px solid var(--border); }

        /* МАГНІТНА КОЛОНКА (Імена) */
        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            z-index: 2; /* Щоб дні проїжджали під іменами */
            box-shadow: 2px 0 5px rgba(0,0,0,0.05); /* Легка тінь для глибини */
            text-align: left;
            padding-left: 15px;
        }
        th:first-child {
            z-index: 3; /* Заголовок "Ім'я" має бути найвище */
            background: var(--primary);
        }

        .weekend { background-color: var(--weekend) !important; }
        .unavailable { color: #ff4d4d; font-weight: 900; font-size: 1.5rem; line-height: 0; cursor: pointer; }
        .shift { font-weight: 700; color: var(--primary); cursor: pointer; }

        /* Пудрові рядки (поширюється і на примагнічену колонку) */
        tr:nth-child(5n+1) td { background-color: var(--row-1); }
        tr:nth-child(5n+2) td { background-color: var(--row-2); }
        tr:nth-child(5n+3) td { background-color: var(--row-3); }
        tr:nth-child(5n+4) td { background-color: var(--row-4); }
        tr:nth-child(5n+5) td { background-color: var(--row-5); }
        
        .hint-text {
            font-size: 0.8rem; margin-top: 15px; color: #888; font-weight: 500;
        }
        
        button#prev, button#next {
            background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 0 10px;
            color: var(--text-main);
        }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <header>
        <img src="IMG_9802.png" alt="Kabinet Logo" class="logo">
        
        <div style="text-align:center; display: flex; align-items: center;">
            <button id="prev">◀</button>
            <span id="month-label" style="font-weight:700; font-size: 1.1rem; margin: 0 15px;">Квітень 2026</span>
            <button id="next">▶</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="table-wrapper">
        <table id="schedule">
            <thead><tr id="header-row"></tr></thead>
            <tbody id="body-row"></tbody>
        </table>
    </div>
    <p class="hint-text">* Натисніть на клітинку, щоб поставити червону крапку (якщо не можете працювати)</p>
</div>

<script>
    // Логіка теми
    function toggleTheme() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }
    // Завантаження теми з пам'яті
    if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));

    // Тестові дані (потім будуть з Firebase)
    let employees = [
        { name: "Марічка", shifts: [1,2,5], unavail: [] },
        { name: "Віталік", shifts: [3,4], unavail: [15] },
        { name: "Марко", shifts: [7,8], unavail: [] },
        { name: "Софія", shifts: [9,10], unavail: [1] }
    ];

    // Рендер таблиці
    function render() {
        const head = document.getElementById('header-row');
        const body = document.getElementById('body-row');
        head.innerHTML = '<th>Ім\'я</th>';
        for(let i=1; i<=30; i++) head.innerHTML += `<th class="${[4,5,11,12,18,19,25,26].includes(i)?'weekend':''}">${i}</th>`;

        body.innerHTML = employees.map(emp => `
            <tr>
                <td style="font-weight:700;">${emp.name}</td>
                ${Array.from({length:30}, (_, i) => {
                    const day = i + 1;
                    const isWeekend = [4,5,11,12,18,19,25,26].includes(day);
                    let content = emp.shifts.includes(day) ? '<span class="shift">X</span>' : '';
                    if(emp.unavail.includes(day)) content = '<span class="unavailable">•</span>';
                    return `<td class="${isWeekend?'weekend':''}" onclick="markUnavail('${emp.name}', ${day})">${content}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    // Логіка відмітки недоступності
    function markUnavail(name, day) {
        const emp = employees.find(e => e.name === name);
        if(emp.unavail.includes(day)) emp.unavail = emp.unavail.filter(d => d !== day);
        else emp.unavail.push(day);
        render(); // Перемальовуємо
    }
    
    // Початковий запуск
    render();
</script>
</body>
</html>
